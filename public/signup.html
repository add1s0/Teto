<!DOCTYPE html>
<html lang="bg">
<head>
    <script src="navbar.js" defer></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedGuide - Sign Up</title>

    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="main.css">
    <script src="footer.js" defer></script>
</head>

<body>
    <navbar-section></navbar-section>
    <main class="container">

        <div class="card">

            <h2>Sign Up</h2>

            <form id="signupForm">

                <input type="text" placeholder="First Name" required>
            <input type="text" placeholder="Last Name" required>

            <input type="email" placeholder="Personal Email" required>

            <input type="password" id="password" placeholder="Password" required>
            <p class="error" id="passwordError"></p>

            <input type="text" placeholder="Emergency Contact First Name" required>
            <input type="text" placeholder="Emergency Contact Last Name" required>
            <input type="email" placeholder="Emergency Contact Email" required>

                <button type="submit">Sign Up</button>

            </form>

            <p class="register-text">
                You already have an account?
                <a href="login.html">Log in</a>
            </p>

        </div>

    </main>

    <script src="signup.js"></script>
    <footer-section></footer-section>

</body>
</html>
