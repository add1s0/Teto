<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedGuide - Sign Up</title>

    <link rel="stylesheet" href="signup.css">
</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar-custom">
        <div class="logo">
            <a href="home.html">
                <img src="logo.png" alt="MedGuide Logo">
                <span class="med">Med</span><span class="guide">Guide</span>
            </a>
        </div>

        <ul class="nav-links">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="accessmap.html">AccessMap</a></li>
            <li><a href="calendar.html">Calendar</a></li>
            <li><a href="help.html">Help</a></li>
        </ul>
    </nav>

    <main class="container">

        <div class="card">

            <h2>Sign Up</h2>

            <form id="signupForm">

                <input type="text" placeholder="First Name" required>
            <input type="text" placeholder="Last Name" required>

            <input type="email" placeholder="Personal Email" required>

            <input type="password" id="password" placeholder="Password" required>
            <p class="error" id="passwordError"></p>

            <input type="text" placeholder="Emergency Contact First Name" required>
            <input type="text" placeholder="Emergency Contact Last Name" required>
            <input type="email" placeholder="Emergency Contact Email" required>

                <button type="submit">Sign in</button>

            </form>

            <p class="register-text">
                You already have an account?
                <a href="login.html">Log in</a>
            </p>

        </div>

    </main>

    <script src="signup.js"></script>

</body>
</html>
