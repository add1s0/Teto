<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Medicine</title>
    <link rel="stylesheet" href="addmed.css">
</head>

<body>

<main class="container">

    <div class="card title-card">
        <h2>Добавяне на лекарствa</h2>
    </div>

    <form id="medicineForm">

        <div id="medications-container">

            <div class="card medicine-card">

                <button type="button" class="remove-btn">✕</button>

                <div class="input-group">
                    <input type="text" name="name" class="medInput" placeholder="Име на лекарството" required autocomplete="off">
                    <ul class="suggestionsList"></ul>
                </div>

                <input type="number" name="dose" class="doseInput" placeholder="Дневна доза" min="1" required>

                <div class="time-container"></div>

            </div>

        </div>

        <div class="button-group">
            <button type="button" id="addMedicineBtn">+ Добави още</button>
            <button type="submit" class="submit-btn">Добави лекарствата</button>
        </div>

    </form>

</main>

<script src="addmed.js"></script>

</body>
</html>
